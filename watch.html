<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Lecture - E-Learning Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(17, 17, 24, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0 40px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            font-size: 22px;
            font-weight: 800;
            color: #ff7200;
            text-decoration: none;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: #ff7200;
            background: rgba(255, 114, 0, 0.1);
        }

        .logout-btn {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.2);
            color: #ff6b6b;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .watch-layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            min-height: calc(100vh - 70px);
        }

        /* Main video area */
        .video-main {
            flex: 1;
            padding: 30px;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .breadcrumb a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: #ff7200;
        }

        .breadcrumb .sep {
            color: rgba(255, 255, 255, 0.2);
        }

        .breadcrumb .current {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Video player */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            /* 16:9 */
            background: #111;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Video info */
        .video-info {
            margin-bottom: 24px;
        }

        .video-info h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .video-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
        }

        /* Action buttons */
        .video-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-complete {
            background: linear-gradient(135deg, #ff7200, #ff9a44);
            color: #fff;
        }

        .btn-complete:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 114, 0, 0.3);
        }

        .btn-complete.completed {
            background: linear-gradient(135deg, #22c55e, #4ade80);
        }

        .btn-complete:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-nav {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }

        .btn-nav:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-nav:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Description */
        .video-description {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 20px 24px;
        }

        .video-description h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.7);
        }

        .video-description p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.6;
        }

        /* Sidebar */
        .sidebar {
            width: 340px;
            background: rgba(17, 17, 24, 0.6);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            overflow-y: auto;
            max-height: calc(100vh - 70px);
            position: sticky;
            top: 70px;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-header h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .sidebar-list {
            padding: 8px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 10px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
            margin-bottom: 4px;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .sidebar-item.active {
            background: rgba(255, 114, 0, 0.1);
            border: 1px solid rgba(255, 114, 0, 0.2);
        }

        .sidebar-item.completed-item .sidebar-num {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
        }

        .sidebar-num {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            flex-shrink: 0;
        }

        .sidebar-item-info h4 {
            font-size: 13px;
            font-weight: 500;
            line-height: 1.3;
        }

        .sidebar-item-info span {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Loading */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 114, 0, 0.2);
            border-top-color: #ff7200;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            transition: bottom 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .toast.show {
            bottom: 30px;
        }

        .toast-success {
            background: #1a3a1a;
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .toast-error {
            background: #3a1a1a;
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        @media (max-width: 900px) {
            .watch-layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: none;
                position: static;
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
            }

            .video-main {
                padding: 20px 15px;
            }

            .navbar {
                padding: 0 20px;
            }

            .nav-links {
                display: none;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="dashboard.html" class="nav-brand">📚 E-Learning</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="Quizzes.html">Quizzes</a>
            <a href="ABOUT.html">About</a>
            <a href="notes.html">Notes</a>
            <a href="certificate.html">Certificate</a>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="watch-layout">
        <!-- Main video area -->
        <div class="video-main">
            <div class="breadcrumb">
                <a href="dashboard.html">Dashboard</a>
                <span class="sep">›</span>
                <a href="#" id="breadcrumbCourse">Course</a>
                <span class="sep">›</span>
                <span class="current" id="breadcrumbLecture">Lecture</span>
            </div>

            <div class="video-container" id="videoContainer">
                <div class="loading-state" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">
                    <div class="loading-spinner"></div>
                    <p>Loading video...</p>
                </div>
            </div>

            <div class="video-info">
                <h1 id="lectureTitle">Loading...</h1>
                <div class="video-meta">
                    <span id="viewCount">👁 0 views</span>
                    <span id="lastWatched"></span>
                </div>
            </div>

            <div class="video-actions">
                <button class="action-btn btn-complete" id="completeBtn" onclick="markComplete()">
                    <span>✓</span> Mark as Completed
                </button>
                <button class="action-btn btn-nav" id="prevBtn" onclick="goPrev()" disabled>
                    ← Previous
                </button>
                <button class="action-btn btn-nav" id="nextBtn" onclick="goNext()" disabled>
                    Next →
                </button>
            </div>

            <div class="video-description" id="descriptionBox" style="display:none">
                <h3>About this Lecture</h3>
                <p id="lectureDescription"></p>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3 id="sidebarCourse">Course Lectures</h3>
                <p id="sidebarProgress">0 / 0 completed</p>
            </div>
            <div class="sidebar-list" id="sidebarList">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="supabase-config.js"></script>
    <script src="auth-guard.js"></script>
    <script>
        let currentLecture = null;
        let allLectures = [];
        let currentIndex = -1;
        let courseId = null;
        let userId = null;
        let progressMap = {};

        async function init() {
            const user = await requireAuth();
            if (!user) return;
            userId = user.id;

            const params = new URLSearchParams(window.location.search);
            const lectureId = params.get('lecture_id');
            courseId = params.get('course_id');

            if (!lectureId || !courseId) {
                window.location.href = 'dashboard.html';
                return;
            }

            await loadLecture(lectureId, courseId);
        }

        async function loadLecture(lectureId, cId) {
            try {
                // Get course
                const { data: course } = await supabaseClient
                    .from('courses')
                    .select('*')
                    .eq('id', cId)
                    .single();

                if (course) {
                    document.getElementById('breadcrumbCourse').textContent = course.title;
                    document.getElementById('breadcrumbCourse').href = `lectures.html?course_id=${cId}`;
                    document.getElementById('sidebarCourse').textContent = course.title;
                }

                // Get all lectures for sidebar
                const { data: lectures } = await supabaseClient
                    .from('lectures')
                    .select('*')
                    .eq('course_id', cId)
                    .order('sort_order');

                allLectures = lectures || [];

                // Get progress
                const { data: progress } = await supabaseClient
                    .from('lecture_progress')
                    .select('*')
                    .eq('user_id', userId)
                    .eq('course_id', cId);

                progressMap = {};
                (progress || []).forEach(p => { progressMap[p.lecture_id] = p; });

                // Find current lecture
                currentIndex = allLectures.findIndex(l => l.id === lectureId);
                currentLecture = allLectures[currentIndex];

                if (!currentLecture) {
                    window.location.href = `lectures.html?course_id=${cId}`;
                    return;
                }

                // Render video
                const videoId = extractYouTubeId(currentLecture.youtube_url);
                const container = document.getElementById('videoContainer');
                if (videoId) {
                    container.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1" 
             referrerpolicy="strict-origin-when-cross-origin" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>`;
                } else {
                    container.innerHTML = '<div class="loading-state" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"><p>Invalid video URL</p></div>';
                }

                // Update info
                document.getElementById('lectureTitle').textContent = currentLecture.title;
                document.getElementById('breadcrumbLecture').textContent = currentLecture.title;
                document.title = `${currentLecture.title} - E-Learning`;

                if (currentLecture.description) {
                    document.getElementById('descriptionBox').style.display = 'block';
                    document.getElementById('lectureDescription').textContent = currentLecture.description;
                }

                // Record view
                await recordView(lectureId, cId);

                // Update button states
                const prog = progressMap[lectureId];
                if (prog && prog.completed) {
                    const btn = document.getElementById('completeBtn');
                    btn.classList.add('completed');
                    btn.innerHTML = '<span>✓</span> Completed';
                }

                if (prog) {
                    document.getElementById('viewCount').textContent = `👁 ${prog.view_count} views`;
                    document.getElementById('lastWatched').textContent = `Last: ${formatDate(prog.last_watched_at)}`;
                }

                // Nav buttons
                document.getElementById('prevBtn').disabled = currentIndex === 0;
                document.getElementById('nextBtn').disabled = currentIndex === allLectures.length - 1;

                // Render sidebar
                renderSidebar(lectureId);

            } catch (err) {
                console.error('Error:', err);
            }
        }

        function renderSidebar(activeLectureId) {
            const list = document.getElementById('sidebarList');
            const completedCount = Object.values(progressMap).filter(p => p.completed).length;

            document.getElementById('sidebarProgress').textContent =
                `${completedCount} / ${allLectures.length} completed`;

            list.innerHTML = allLectures.map((lecture, i) => {
                const prog = progressMap[lecture.id];
                const isCompleted = prog && prog.completed;
                const isActive = lecture.id === activeLectureId;

                return `
          <a href="watch.html?lecture_id=${lecture.id}&course_id=${courseId}" 
             class="sidebar-item ${isActive ? 'active' : ''} ${isCompleted ? 'completed-item' : ''}">
            <div class="sidebar-num">${isCompleted ? '✓' : (i + 1)}</div>
            <div class="sidebar-item-info">
              <h4>${lecture.title}</h4>
              <span>${isCompleted ? 'Completed' : 'Not started'}</span>
            </div>
          </a>
        `;
            }).join('');
        }

        async function recordView(lectureId, cId) {
            try {
                const existing = progressMap[lectureId];

                if (existing) {
                    await supabase
                        .from('lecture_progress')
                        .update({
                            view_count: existing.view_count + 1,
                            last_watched_at: new Date().toISOString()
                        })
                        .eq('id', existing.id);

                    existing.view_count += 1;
                } else {
                    const { data } = await supabase
                        .from('lecture_progress')
                        .insert({
                            user_id: userId,
                            lecture_id: lectureId,
                            course_id: cId,
                            completed: false,
                            view_count: 1
                        })
                        .select()
                        .single();

                    if (data) progressMap[lectureId] = data;
                }

                const prog = progressMap[lectureId];
                if (prog) {
                    document.getElementById('viewCount').textContent = `👁 ${prog.view_count} views`;
                }
            } catch (err) {
                console.error('Error recording view:', err);
            }
        }

        async function markComplete() {
            if (!currentLecture) return;

            const btn = document.getElementById('completeBtn');
            const prog = progressMap[currentLecture.id];
            const newState = !(prog && prog.completed);

            btn.disabled = true;

            try {
                if (prog) {
                    await supabaseClient
                        .from('lecture_progress')
                        .update({ completed: newState })
                        .eq('id', prog.id);

                    prog.completed = newState;
                } else {
                    const { data } = await supabaseClient
                        .from('lecture_progress')
                        .insert({
                            user_id: userId,
                            lecture_id: currentLecture.id,
                            course_id: courseId,
                            completed: true,
                            view_count: 1
                        })
                        .select()
                        .single();

                    if (data) progressMap[currentLecture.id] = data;
                }

                if (newState) {
                    btn.classList.add('completed');
                    btn.innerHTML = '<span>✓</span> Completed';
                    showToast('Lecture marked as completed! 🎉');
                } else {
                    btn.classList.remove('completed');
                    btn.innerHTML = '<span>✓</span> Mark as Completed';
                    showToast('Lecture marked as incomplete');
                }

                renderSidebar(currentLecture.id);
            } catch (err) {
                console.error('Error:', err);
                showToast('Error updating progress', 'error');
            } finally {
                btn.disabled = false;
            }
        }

        function goPrev() {
            if (currentIndex > 0) {
                const prev = allLectures[currentIndex - 1];
                window.location.href = `watch.html?lecture_id=${prev.id}&course_id=${courseId}`;
            }
        }

        function goNext() {
            if (currentIndex < allLectures.length - 1) {
                const next = allLectures[currentIndex + 1];
                window.location.href = `watch.html?lecture_id=${next.id}&course_id=${courseId}`;
            }
        }

        init();
    </script>
    <script src="chatbot.js"></script>
    <script src="mobile-nav.js"></script>
</body>

</html>
