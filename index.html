<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - E-Learning Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(255, 114, 0, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 114, 0, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(200, 60, 0, 0.06) 0%, transparent 50%);
    }

    .bg-animation::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: repeating-conic-gradient(from 0deg,
          transparent 0deg 88deg,
          rgba(255, 114, 0, 0.02) 88deg 90deg);
      animation: rotateGrid 60s linear infinite;
    }

    @keyframes rotateGrid {
      to {
        transform: rotate(360deg);
      }
    }

    .login-container {
      position: relative;
      z-index: 1;
      display: flex;
      width: 900px;
      max-width: 95vw;
      min-height: 550px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 114, 0, 0.1);
    }

    /* Left panel - branding */
    .brand-panel {
      flex: 1;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .brand-panel::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 114, 0, 0.15), transparent 70%);
      border-radius: 50%;
    }

    .brand-panel::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(255, 114, 0, 0.1), transparent 70%);
      border-radius: 50%;
    }

    .brand-logo {
      font-size: 28px;
      font-weight: 800;
      color: #ff7200;
      margin-bottom: 30px;
      letter-spacing: -0.5px;
    }

    .brand-title {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .brand-title span {
      color: #ff7200;
      display: block;
    }

    .brand-desc {
      color: rgba(255, 255, 255, 0.6);
      font-size: 15px;
      line-height: 1.7;
      max-width: 320px;
    }

    .brand-stats {
      display: flex;
      gap: 30px;
      margin-top: 40px;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #ff7200;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }

    /* Right panel - form */
    .form-panel {
      flex: 1;
      background: #111118;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-title {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }

    .form-subtitle {
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
      margin-bottom: 35px;
    }

    .input-group {
      margin-bottom: 22px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: #ff7200;
      background: rgba(255, 114, 0, 0.05);
      box-shadow: 0 0 0 3px rgba(255, 114, 0, 0.1);
    }

    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .login-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #ff7200, #ff9a44);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      position: relative;
      overflow: hidden;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 114, 0, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-btn .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    .login-btn.loading .btn-text {
      display: none;
    }

    .login-btn.loading .spinner {
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-msg {
      background: rgba(255, 59, 48, 0.1);
      border: 1px solid rgba(255, 59, 48, 0.3);
      color: #ff6b6b;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .form-footer {
      margin-top: 25px;
      text-align: center;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.4);
    }

    .form-footer a {
      color: #ff7200;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .form-footer a:hover {
      color: #ff9a44;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      transition: bottom 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .toast.show {
      bottom: 30px;
    }

    .toast-success {
      background: #1a3a1a;
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.2);
    }

    .toast-error {
      background: #3a1a1a;
      color: #ff6b6b;
      border: 1px solid rgba(255, 107, 107, 0.2);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .login-container {
        flex-direction: column;
        min-height: auto;
      }

      .brand-panel {
        padding: 30px 25px;
      }

      .brand-title {
        font-size: 26px;
      }

      .brand-stats {
        gap: 20px;
      }

      .form-panel {
        padding: 30px 25px;
      }
    }
  </style>
</head>

<body>
  <div class="bg-animation"></div>

  <div class="login-container">
    <!-- Left branding panel -->
    <div class="brand-panel">
      <div class="brand-logo">📚 E-Learning</div>
      <div class="brand-title">
        Welcome Back to
        <span>Self-Paced Learning</span>
      </div>
      <p class="brand-desc">
        Access educational materials, YouTube lectures, quizzes, and track your learning progress — all in one place.
      </p>
      <div class="brand-stats">
        <div class="stat">
          <div class="stat-number">7+</div>
          <div class="stat-label">Courses</div>
        </div>
        <div class="stat">
          <div class="stat-number">50+</div>
          <div class="stat-label">Lectures</div>
        </div>
        <div class="stat">
          <div class="stat-number">Free</div>
          <div class="stat-label">Forever</div>
        </div>
      </div>
    </div>

    <!-- Right form panel -->
    <div class="form-panel">
      <h2 class="form-title">Sign In</h2>
      <p class="form-subtitle">Enter your credentials to continue learning</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="form-footer">
        Don't have an account? <a href="signup.html">Sign up here</a>
      </div>
    </div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth-guard.js"></script>
  <script>
    // Check if already logged in
    (async () => {
      const user = await getCurrentUser();
      if (user) {
        const admin = await isAdmin();
        window.location.href = admin ? 'admin.html' : 'dashboard.html';
      }
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('errorMsg');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errorDiv.style.display = 'none';
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) throw error;

        // Check if admin
        const { data: profile } = await supabaseClient
          .from('profiles')
          .select('role')
          .eq('id', data.user.id)
          .single();

        showToast('Login successful! Redirecting...');

        setTimeout(() => {
          if (profile && profile.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        }, 800);

      } catch (error) {
        errorDiv.textContent = error.message || 'Login failed. Please check your credentials.';
        errorDiv.style.display = 'block';
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }
  </script>
</body>

</html>
