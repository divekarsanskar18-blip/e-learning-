<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - E-Learning Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: rgba(17, 17, 24, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0 40px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            font-size: 22px;
            font-weight: 800;
            color: #ff7200;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #ff7200;
            background: rgba(255, 114, 0, 0.1);
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-user-name {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .logout-btn {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.2);
            color: #ff6b6b;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255, 59, 48, 0.2);
        }

        /* Main content */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Welcome section */
        .welcome {
            margin-bottom: 40px;
        }

        .welcome h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .welcome h1 span {
            color: #ff7200;
        }

        .welcome p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 15px;
        }

        /* Stats cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 45px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            padding: 28px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 114, 0, 0.2);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-card-icon {
            font-size: 32px;
            margin-bottom: 16px;
        }

        .stat-card-value {
            font-size: 36px;
            font-weight: 800;
            color: #ff7200;
            margin-bottom: 4px;
        }

        .stat-card-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
        }

        /* Courses section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .course-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            padding: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .course-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 114, 0, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .course-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .course-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 114, 0, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .course-lectures-count {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .course-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .course-card p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* Progress bar */
        .progress-container {
            margin-top: auto;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .progress-label {
            color: rgba(255, 255, 255, 0.5);
        }

        .progress-value {
            color: #ff7200;
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff7200, #ff9a44);
            border-radius: 3px;
            transition: width 0.6s ease;
        }

        /* Loading */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 114, 0, 0.2);
            border-top-color: #ff7200;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            transition: bottom 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .toast.show {
            bottom: 30px;
        }

        .toast-success {
            background: #1a3a1a;
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .toast-error {
            background: #3a1a1a;
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 20px;
            }

            .nav-links {
                display: none;
            }

            .main {
                padding: 25px 15px;
            }

            .welcome h1 {
                font-size: 24px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .stat-card {
                padding: 20px;
            }

            .stat-card-value {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="dashboard.html" class="nav-brand">📚 E-Learning</a>
        <div class="nav-links">
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="Quizzes.html">Quizzes</a>
            <a href="ABOUT.html">About</a>
        </div>
        <div class="nav-user">
            <span class="nav-user-name" id="navUserName"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main">
        <!-- Welcome -->
        <div class="welcome">
            <h1>Welcome back, <span id="userName">Student</span>! 👋</h1>
            <p>Continue your learning journey. Here's your progress overview.</p>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-card-icon">📚</div>
                <div class="stat-card-value" id="totalCourses">0</div>
                <div class="stat-card-label">Available Courses</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">🎥</div>
                <div class="stat-card-value" id="totalLectures">0</div>
                <div class="stat-card-label">Total Lectures</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">✅</div>
                <div class="stat-card-value" id="completedLectures">0</div>
                <div class="stat-card-label">Lectures Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">📊</div>
                <div class="stat-card-value" id="overallProgress">0%</div>
                <div class="stat-card-label">Overall Progress</div>
            </div>
        </div>

        <!-- Courses -->
        <div class="section-header">
            <h2 class="section-title">Your Courses</h2>
        </div>
        <div class="courses-grid" id="coursesGrid">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading courses...</p>
            </div>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="supabase-config.js"></script>
    <script src="auth-guard.js"></script>
    <script>
        const courseIcons = ['💻', '⚙️', '☕', '🌐', '🐍', '🔗', '🗄️', '📘', '🧮', '🎨'];

        async function init() {
            const user = await requireAuth();
            if (!user) return;

            const profile = await getUserProfile();
            if (profile) {
                document.getElementById('userName').textContent = profile.full_name.split(' ')[0];
                document.getElementById('navUserName').textContent = profile.full_name;
            }

            await loadDashboard(user.id);
        }

        async function loadDashboard(userId) {
            try {
                // Fetch courses
                const { data: courses, error: coursesError } = await supabaseClient
                    .from('courses')
                    .select('*')
                    .order('created_at');

                if (coursesError) throw coursesError;

                // Fetch all lectures
                const { data: lectures, error: lecturesError } = await supabaseClient
                    .from('lectures')
                    .select('*');

                if (lecturesError) throw lecturesError;

                // Fetch user's progress
                const { data: progress, error: progressError } = await supabaseClient
                    .from('lecture_progress')
                    .select('*')
                    .eq('user_id', userId);

                if (progressError) throw progressError;

                // Calculate stats
                const completedSet = new Set(
                    (progress || []).filter(p => p.completed).map(p => p.lecture_id)
                );

                const totalLectures = (lectures || []).length;
                const completedCount = completedSet.size;
                const overallPct = totalLectures > 0 ? Math.round((completedCount / totalLectures) * 100) : 0;

                document.getElementById('totalCourses').textContent = (courses || []).length;
                document.getElementById('totalLectures').textContent = totalLectures;
                document.getElementById('completedLectures').textContent = completedCount;
                document.getElementById('overallProgress').textContent = overallPct + '%';

                // Render courses
                const grid = document.getElementById('coursesGrid');
                if (!courses || courses.length === 0) {
                    grid.innerHTML = '<div class="loading-state"><p>No courses available yet. Ask your admin to add some!</p></div>';
                    return;
                }

                grid.innerHTML = courses.map((course, i) => {
                    const courseLectures = (lectures || []).filter(l => l.course_id === course.id);
                    const courseCompleted = courseLectures.filter(l => completedSet.has(l.id)).length;
                    const coursePct = courseLectures.length > 0 ? Math.round((courseCompleted / courseLectures.length) * 100) : 0;

                    return `
            <a href="lectures.html?course_id=${course.id}" class="course-card">
              <div class="course-card-header">
                <div class="course-icon">${courseIcons[i % courseIcons.length]}</div>
                <span class="course-lectures-count">${courseLectures.length} lectures</span>
              </div>
              <h3>${course.title}</h3>
              <p>${course.description || 'Explore this course'}</p>
              <div class="progress-container">
                <div class="progress-info">
                  <span class="progress-label">${courseCompleted} / ${courseLectures.length} completed</span>
                  <span class="progress-value">${coursePct}%</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${coursePct}%"></div>
                </div>
              </div>
            </a>
          `;
                }).join('');

            } catch (err) {
                console.error('Dashboard error:', err);
                document.getElementById('coursesGrid').innerHTML =
                    '<div class="loading-state"><p>Error loading courses. Please try again.</p></div>';
            }
        }

        init();
    </script>
</body>

</html>
