<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Certificate - E-learning</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f0f0f, #660000);
      color: #fff;
      margin: 0;
      padding: 0;
    }
    header {
      background: #111;
      padding: 15px;
      text-align: center;
      color: orange;
      font-size: 22px;
      font-weight: bold;
    }
    .container {
      width: 80%;
      margin: 40px auto;
      background: #1c1c1c;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(255, 165, 0, 0.5);
    }
    h2 {
      text-align: center;
      color: orange;
    }
    label {
      display: block;
      margin: 15px 0 5px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      border: none;
      border-bottom: 2px solid orange;
      background: transparent;
      color: #fff;
      font-size: 16px;
    }
    button {
      margin-top: 20px;
      background: orange;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .certificate {
      margin-top: 40px;
      background: #fff;
      color: #000;
      padding: 30px;
      text-align: center;
      border-radius: 10px;
      display: none;
    }
    .certificate h3 {
      color: #660000;
    }
  </style>
</head>
<body>
  <header>
    E-learning | Student Certificate
  </header>

  <div class="container">
    <h2>Generate Your Certificate</h2>
    <form id="certificateForm">
      <label for="studentName">Student Name:</label>
      <input type="text" id="studentName" required>

      <label for="courseName">Course Name:</label>
      <input type="text" id="courseName" required>

      <label for="completionDate">Completion Date:</label>
      <input type="date" id="completionDate" required>

      <button type="submit">Generate Certificate</button>
    </form>

    <div class="certificate" id="certificateBox">
      <h2>Certificate of Completion</h2>
      <p>This is to certify that</p>
      <h3 id="certName"></h3>
      <p>has successfully completed the course</p>
      <h3 id="certCourse"></h3>
      <p>on</p>
      <h3 id="certDate"></h3>
      <p>Presented by <strong>E-learning </strong></p>
    </div>
  </div>

  <script>
    document.getElementById("certificateForm").addEventListener("submit", function(e) {
      e.preventDefault();
      document.getElementById("certName").innerText = document.getElementById("studentName").value;
      document.getElementById("certCourse").innerText = document.getElementById("courseName").value;
      document.getElementById("certDate").innerText = document.getElementById("completionDate").value;
      document.getElementById("certificateBox").style.display = "block";
    });
  </script>
</body>
</html>
